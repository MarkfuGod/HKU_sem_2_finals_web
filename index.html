<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FITE7410 · HKU Sem 2 Finals Web</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&family=Inter:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAF6EC;--card:#FFFCF5;--ink:#1B1A14;--muted:#5C564B;--navy:#1E3A5F;--rust:#B5532A;--rule:#E5DDC8}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);
  display:flex;align-items:center;justify-content:center;padding:32px 20px}
main{max-width:520px;width:100%}
h1{font-family:"Source Serif 4",Georgia,serif;font-size:1.75rem;font-weight:700;margin:0 0 8px;color:var(--navy)}
p.lead{margin:0 0 28px;font-size:15px;line-height:1.6;color:var(--muted)}
.cards{display:grid;gap:14px}
a.card{display:block;padding:22px 24px;background:var(--card);border:1px solid var(--rule);border-radius:14px;
  text-decoration:none;color:inherit;box-shadow:0 4px 20px rgba(27,26,20,.06);transition:transform .15s,border-color .15s}
a.card:hover{border-color:var(--navy);transform:translateY(-2px)}
a.card strong{display:block;font-size:17px;margin-bottom:6px;color:var(--navy)}
a.card span{font-size:13px;color:var(--muted);line-height:1.5}
footer{margin-top:28px;font-size:12px;color:var(--muted);text-align:center}
</style>
</head>
<body>
<main>
  <h1>FITE7410 复习站</h1>
  <p class="lead">在「通俗复习页」和「历年真题详解」之间切换；部署在 GitHub Pages 上。</p>
  <div class="cards">
    <a class="card" href="./study-page.html">
      <strong>侦探手册 · 复习页</strong>
      <span>study-page.html — 结构、概念、计算与小抄</span>
    </a>
    <a class="card" href="./past-papers-solutions.html">
      <strong>真题解答 · NeurIPS 风注解</strong>
      <span>past-papers-solutions.html — 2021–2025 与 online 卷</span>
    </a>
  </div>
  <footer>每页顶部可返回首页或跳到另一页。</footer>
</main>
</body>
</html>
